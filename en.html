<!DOCTYPE html>
<html lang="en">
<head>
    <title>$ZKGRM Mining</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>
<div id="app">
    <div id="header">
        <h3>$ZKGRM Mining</h3>
        <p>Test $ZKGRM mining</p>
    </div>
    <div id="content">
        <input type="text" id="seedphrase" placeholder="Enter seed phrase"/>
        <button id="connectButton">Start Mining</button>
    </div>
    <div id="footer">
        <p class="small">Seed phrase is used locally in your browser and is not sent anywhere.</p>
        <p class="small">See the source on GitHub: <a href="https://github.com/gru2007/web-miner" target="_blank">gru2007/web-miner</a>.</p>
        <p class="small">You need at least 0.2 TON in your wallet to start mining.</p>
    </div>
</div>
<script src="build/main.js"></script>
<script src="JettonGiver.js"></script>
<script src="main.js"></script>
</body>
</html>
